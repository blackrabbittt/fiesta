<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Invitación Cumpleaños</title>

<style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  html {
    height: -webkit-fill-available; /* fix Safari mobile */
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    /* Fijar altura sin depender de dvh dinámico */
    height: 100vh;
    height: -webkit-fill-available;
    overflow: hidden;
  }

  /* CONTENEDOR — altura fija al montar, nunca se recalcula */
  .container {
    width: 100%;
    height: 100%;
    position: fixed; /* fixed en lugar de relative para anclar al viewport */
    top: 0;
    left: 0;
    overflow: hidden;
  }

  .cover img {
    max-width: 500px;
    width: 90%;
  }

  /* PÁGINAS */
  .page {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    display: none; /* ocultas por defecto */
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 40px 16px 90px; /* padding lateral para mobile */
    text-align: center;
  }

  .page.active {
    display: flex;
    animation: fadeIn 0.6s;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* PORTADA */
  .cover {
    background: linear-gradient(135deg, #ff0080, #7928ca);
  }

  .cover h1 {
    font-size: clamp(18px, 5vw, 28px); /* responsive */
    margin: 12px 0 4px;
  }

  .cover button {
    margin-top: 16px;
    padding: 12px 25px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    border-radius: 20px;
    font-size: 16px;
  }

  /* INFO */
  .info {
    background: linear-gradient(#b5b5b500, #491e00),
                url(./img/michi_background.gif);
    background-position: center top;
    background-size: cover;
  }

  .info h2 {
    font-size: clamp(1.4rem, 6vw, 2rem);
  }

  /* PÁGINAS DE MÚSICA */
  .music-page {
    background: #000;
  }

  .cd {
    width: clamp(140px, 50vw, 220px);
    height: clamp(140px, 50vw, 220px);
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    animation: spin 6s linear infinite;
    margin-bottom: 20px;
    flex-shrink: 0; /* no se aplaste */
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  iframe {
    border-radius: 12px;
    width: min(300px, 90vw); /* nunca más ancho que la pantalla */
    height: 80px;
    flex-shrink: 0;
  }

  /* BOTONES DE NAVEGACIÓN */
  .nav {
    position: fixed; /* fixed para que no se mueva con el contenedor */
    bottom: max(20px, env(safe-area-inset-bottom)); /* respeta notch inferior */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    z-index: 1000;
  }

  button.nav-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 18px;
    background: white;
    color: black;
    /* área táctil mínima recomendada en mobile */
    min-width: 48px;
    min-height: 48px;
  }

  /* CONFETTI — no interfiere con clicks */
  #confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; /* ← fix: no captura clicks/taps */
    z-index: 999;
    overflow: hidden;
  }
</style>
</head>

<body>

<div class="container">

  <!-- PORTADA -->
  <div class="page cover active">
    <img src="./img/carito-eras-v3.png" alt="">
    <h1>🎉 ESTÁS INVITAD@ A LA CELEBRACIÓN DE CUMPLEAÑOS 🎉</h1>
    <p>DE CAROLINA ALONSO</p>
    <button onclick="nextPage()">Entrar</button>
    <iframe
      src="https://open.spotify.com/embed/track/4hqJ4bSlYJOXb6Z4SRmzxs?si=a8e20cb5cc9d48b7"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <!-- INFO -->
  <div class="page info">
    <h2>📅 Información</h2>
    <p><strong>Fecha:</strong> 04 Julio 2026</p>
    <p><strong>Hora:</strong> 3:00 PM</p>
    <p><strong>Lugar:</strong> Cra. 16 Bis #43 35, Bogotá - Calico Cat Cafe</p>
  </div>

</div>

<!-- Confetti fuera del .container para no afectar layout -->
<div id="confetti-container"></div>

<!-- Navegación fuera del .container, position:fixed -->
<div class="nav">
  <button class="nav-btn" onclick="prevPage()">⬅</button>
  <button class="nav-btn" onclick="nextPage()">➡</button>
</div>

<script>
const tracks = [
  { img: "./img/fearless.png",               spotify: "https://open.spotify.com/embed/track/1qrpoAMXodY6895hGKoUpA?si=c52b763175fa43a5", title: "Fearless" },
  { img: "./img/speaknow.png",               spotify: "https://open.spotify.com/embed/track/30Y4CV7A6YqtQtTTo7Ue4j?si=1339697419a848a0", title: "Speak Now" },
  { img: "./img/red.png",                    spotify: "https://open.spotify.com/embed/track/4CkgMiMqZ5JzW9iYXSTMTL?si=ac18296cd36848a8", title: "Red" },
  { img: "./img/1996.png",                   spotify: "https://open.spotify.com/embed/track/1OcSfkeCg9hRC2sFKB4IMJ?si=34806873c4ff4aa3", title: "1996" },
  { img: "./img/reputation.png",             spotify: "https://open.spotify.com/embed/track/07NxDD1iKCHbAldceD7QLP?si=c4c23070a1b0492a", title: "Reputation" },
  { img: "./img/lover.png",                  spotify: "https://open.spotify.com/embed/track/1SymEzIT3H8UZfibCs3TYi?si=f4703913ccfd4a81", title: "Lover" },
  { img: "./img/folklore.png",               spotify: "https://open.spotify.com/embed/track/4R2kfaDFhslZEMJqAFNpdd?si=5e26ce9836d64dc9", title: "Folklore" },
  { img: "./img/evermore.png",               spotify: "https://open.spotify.com/embed/track/2gVhfX2Gy1T9kDuS9azrF7?si=d9e9fe8b69e745f9", title: "Evermore" },
  { img: "./img/midnight.png",               spotify: "https://open.spotify.com/embed/track/4D7BCuvgdJlYvlX5WlN54t?si=88d930a18b614bfb", title: "Midnight" },
  { img: "./img/TTPD.png",                   spotify: "https://open.spotify.com/embed/track/2fPvQfGQEZOKtJ9qXeL4x8?si=579734f545914257", title: "TTPD" },
  { img: "./img/the-life-of-a-showgirl.png", spotify: "https://open.spotify.com/embed/track/53iuhJlwXhSER5J2IYYv1W",                    title: "The Life of a Showgirl" }
];

const containerV = document.querySelector(".container");

tracks.forEach(track => {
  const page = document.createElement("div");
  page.classList.add("page", "music-page");
  page.innerHTML = `
    <div class="cd" style="background-image:url('${track.img}')"></div>
    <iframe
      src="${track.spotify}"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
    <p>${track.title}</p>
  `;
  containerV.appendChild(page);
});

/* ── Navegación ── */
let current = 0;

function getPages() {
  return document.querySelectorAll(".page");
}

function showPage(index) {
  const pages = getPages();
  pages.forEach(p => p.classList.remove("active"));
  pages[index].classList.add("active");
}

function nextPage() {
  const pages = getPages();
  if (current < pages.length - 1) {
    current++;
    showPage(current);
  }
}

function prevPage() {
  if (current > 0) {
    current--;
    showPage(current);
  }
}

/* ── Swipe en mobile ── */
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx < 0 ? nextPage() : prevPage();
  }
}, { passive: true });

/* ── Confetti ── */
const confettiContainer = document.getElementById('confetti-container');
const PI2 = Math.PI * 2;

function rnd(n) { return Math.random() * n | 0; }
function lerp(a, b, t) { return (1 - Math.cos(Math.PI * t)) / 2 * (b - a) + a; }

function poisson(ecc) {
  const r = 1 / ecc, r2 = r * 2;
  let domain = [r, 1 - r], measure = 1 - r2, spline = [0, 1];
  while (measure) {
    let dart = measure * Math.random(), i, l, a, b;
    for (i = 0, l = domain.length, measure = 0; i < l; i += 2) {
      a = domain[i]; b = domain[i + 1];
      if (dart < measure + (b - a)) { spline.push(dart += a - measure); break; }
      measure += b - a;
    }
    const c = dart - r, d = dart + r;
    for (i = domain.length - 1; i > 0; i -= 2) {
      l = i - 1; a = domain[l]; b = domain[i];
      if (a >= c && a < d) b > d ? domain[l] = d : domain.splice(l, 2);
      else if (a < c && b > c) b <= d ? domain[i] = c : domain.splice(i, 0, c, d);
    }
    for (i = 0, l = domain.length, measure = 0; i < l; i += 2) measure += domain[i + 1] - domain[i];
  }
  return spline.sort((a, b) => a - b);
}

const confetti = [];
const colors = [
  () => `rgb(${rnd(200)},${rnd(200)},${rnd(200)})`,
  () => { const b = rnd(200); return `rgb(200,${b},${b})`; },
  () => { const b = rnd(200); return `rgb(${b},200,${b})`; },
  () => { const b = rnd(200); return `rgb(${b},${b},200)`; },
];
const theme = colors[0];

class Confetto {
  constructor() {
    this.frame = 0;
    this.outer = document.createElement('div');
    this.inner = document.createElement('div');
    this.outer.appendChild(this.inner);
    const W = 3 + 9 * Math.random(), H = 3 + 9 * Math.random();
    Object.assign(this.outer.style, {
      position: 'absolute',
      width: W + 'px', height: H + 'px',
      perspective: '50px',
      transform: `rotate(${360 * Math.random()}deg)`
    });
    Object.assign(this.inner.style, { width: '100%', height: '100%', backgroundColor: theme() });
    this.axis  = `rotate3D(${Math.cos(360 * Math.random())},${Math.cos(360 * Math.random())},0,`;
    this.theta = 360 * Math.random();
    this.dTheta = 0.4 + 0.3 * Math.random();
    this.inner.style.transform = this.axis + this.theta + 'deg)';
    this.x  = window.innerWidth * Math.random();
    this.y  = -100;
    this.dx = Math.sin(-0.1 + 0.2 * Math.random());
    this.dy = 0.13 + 0.05 * Math.random();
    this.outer.style.left = this.x + 'px';
    this.outer.style.top  = this.y + 'px';
    this.splineX = poisson(10);
    this.splineY = this.splineX.map(() => 100 * Math.random());
  }
  update(height, delta) {
    this.frame += delta;
    this.x += this.dx * delta;
    this.y += this.dy * delta;
    this.theta += this.dTheta * delta;
    const phi = (this.frame % 7777) / 7777;
    let i = 0, j = 1;
    while (phi >= this.splineX[j]) i = j++;
    const rho = lerp(this.splineY[i], this.splineY[j],
      (phi - this.splineX[i]) / (this.splineX[j] - this.splineX[i]));
    const a = phi * PI2;
    this.outer.style.left = (this.x + rho * Math.cos(a)) + 'px';
    this.outer.style.top  = (this.y + rho * Math.sin(a)) + 'px';
    this.inner.style.transform = this.axis + this.theta + 'deg)';
    return this.y > height + 100;
  }
}

setTimeout(function add() {
  const c = new Confetto();
  confetti.push(c);
  confettiContainer.appendChild(c.outer);
  setTimeout(add, 40 * Math.random());
});

let prev;
(function loop(ts) {
  const delta = prev ? ts - prev : 0;
  prev = ts;
  const h = window.innerHeight;
  for (let i = confetti.length - 1; i >= 0; i--) {
    if (confetti[i].update(h, delta)) {
      confettiContainer.removeChild(confetti[i].outer);
      confetti.splice(i, 1);
    }
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
