<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* CONTENEDOR */
.container {
  width: 100vw;
  height: 100vh;
  position: relative;
}
.cover img {
    max-width: 500px;
    width: 100%;
}
/* PÁGINAS */
.page {
  width: 100%;
  height: 100%;
  position: absolute;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  box-sizing: border-box;
  transition: 0.6s;
}

.page.active {
  display: flex;
  animation: fadeIn 0.6s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95);}
  to { opacity: 1; transform: scale(1);}
}

/* PORTADA */
.cover {
  background: linear-gradient(135deg, #ff0080, #7928ca);
}

.cover h1 {
  font-size: 28px;
}

.cover button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  border-radius: 20px;
}

/* INFO */
.info {
    background: linear-gradient(#b5b5b500, #491e00), url(./img/michi_background.gif);
    background-position: center top;
}

.info h2 {
  font-size: 2rem;
}

/* PAGINAS MUSICA */
.music-page {
  background: #000;
}

.cd {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: spin 6s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  from { transform: rotate(0deg);}
  to { transform: rotate(360deg);}
}
.cover iframe {
    margin-left: auto;
}
iframe {
  border-radius: 12px;
}

/* BOTONES */
.nav {
  position: absolute;
  bottom: 20px;
  display: flex;
  gap: 20px;
}

button.nav-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

</style>

<script>

let current = 0;
const pages = document.querySelectorAll(".page");

function showPage(index){
  pages.forEach(p => p.classList.remove("active"));
  pages[index].classList.add("active");
}

function nextPage(){
  if(current < pages.length -1){
    current++;
    showPage(current);
  }
}

function prevPage(){
  if(current > 0){
    current--;
    showPage(current);
  }
}

 
</script>
<script>
  
  /* ── Confetti ── */
  const container = document.getElementById('confetti-container');
  const PI2 = Math.PI * 2;
  const colorThemes = [
    () => `rgb(${rnd(200)},${rnd(200)},${rnd(200)})`,
    () => { const b = rnd(200); return `rgb(200,${b},${b})`; },
    () => { const b = rnd(200); return `rgb(${b},200,${b})`; },
    () => { const b = rnd(200); return `rgb(${b},${b},200)`; },
    () => `rgb(200,100,${rnd(200)})`,
    () => `rgb(${rnd(200)},200,200)`,
  ];
  function rnd(n) { return Math.random() * n | 0; }

  function lerp(a, b, t) { return (1 - Math.cos(Math.PI * t)) / 2 * (b - a) + a; }

  function poisson(ecc) {
    const r = 1 / ecc, r2 = r * 2;
    let domain = [r, 1 - r], measure = 1 - r2, spline = [0, 1];
    while (measure) {
      let dart = measure * Math.random(), i, l, a, b;
      for (i = 0, l = domain.length, measure = 0; i < l; i += 2) {
        a = domain[i]; b = domain[i + 1];
        if (dart < measure + (b - a)) { spline.push(dart += a - measure); break; }
        measure += b - a;
      }
      const c = dart - r, d = dart + r;
      for (i = domain.length - 1; i > 0; i -= 2) {
        l = i - 1; a = domain[l]; b = domain[i];
        if (a >= c && a < d) b > d ? domain[l] = d : domain.splice(l, 2);
        else if (a < c && b > c) b <= d ? domain[i] = c : domain.splice(i, 0, c, d);
      }
      for (i = 0, l = domain.length, measure = 0; i < l; i += 2) measure += domain[i + 1] - domain[i];
    }
    return spline.sort((a, b) => a - b);
  }

  const confetti = [];
  const theme = colorThemes[0];

  class Confetto {
    constructor() {
      this.frame = 0;
      this.outer = document.createElement('div');
      this.inner = document.createElement('div');
      this.outer.appendChild(this.inner);
      const W = 3 + 9 * Math.random(), H = 3 + 9 * Math.random();
      Object.assign(this.outer.style, { position: 'absolute', width: W + 'px', height: H + 'px', perspective: '50px', transform: `rotate(${360 * Math.random()}deg)` });
      Object.assign(this.inner.style, { width: '100%', height: '100%', backgroundColor: theme() });
      this.axis = `rotate3D(${Math.cos(360 * Math.random())},${Math.cos(360 * Math.random())},0,`;
      this.theta = 360 * Math.random();
      this.dTheta = 0.4 + 0.3 * Math.random();
      this.inner.style.transform = this.axis + this.theta + 'deg)';
      this.x = window.innerWidth * Math.random();
      this.y = -100;
      this.dx = Math.sin(-0.1 + 0.2 * Math.random());
      this.dy = 0.13 + 0.05 * Math.random();
      this.outer.style.left = this.x + 'px';
      this.outer.style.top = this.y + 'px';
      this.splineX = poisson(10);
      this.splineY = this.splineX.map((_, i) => i === 0 || i === this.splineX.length - 1 ? 100 * Math.random() : 100 * Math.random());
    }
    update(height, delta) {
      this.frame += delta;
      this.x += this.dx * delta;
      this.y += this.dy * delta;
      this.theta += this.dTheta * delta;
      const phi = (this.frame % 7777) / 7777;
      let i = 0, j = 1;
      while (phi >= this.splineX[j]) i = j++;
      const rho = lerp(this.splineY[i], this.splineY[j], (phi - this.splineX[i]) / (this.splineX[j] - this.splineX[i]));
      const a = phi * PI2;
      this.outer.style.left = (this.x + rho * Math.cos(a)) + 'px';
      this.outer.style.top = (this.y + rho * Math.sin(a)) + 'px';
      this.inner.style.transform = this.axis + this.theta + 'deg)';
      return this.y > height + 100;
    }
  }

  let animFrame;
  let addTimer = setTimeout(function add() {
    const c = new Confetto();
    confetti.push(c);
    container.appendChild(c.outer);
    addTimer = setTimeout(add, 40 * Math.random());
  });

  let prev;
  (function loop(ts) {
    const delta = prev ? ts - prev : 0;
    prev = ts;
    const h = window.innerHeight;
    for (let i = confetti.length - 1; i >= 0; i--) {
      if (confetti[i].update(h, delta)) {
        container.removeChild(confetti[i].outer);
        confetti.splice(i, 1);
      }
    }
    animFrame = requestAnimationFrame(loop);
  })();
</script>
